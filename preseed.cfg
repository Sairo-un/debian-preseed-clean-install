### Localización e idioma
d-i debian-installer/locale string es_MX.UTF-8
d-i console-setup/ask_detect boolean false
d-i keyboard-configuration/xkb-keymap select es

### Red
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string servidor-debian
d-i netcfg/get_domain string local

### Espejo de Debian
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Zona horaria
d-i time/zone string America/Mexico_City
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

### Particionado automático - Borra todo el disco
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/expert_recipe string                         \
      atomic ::                                               \
              100 50 100 ext4                                 \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .                                               \
              512 10000 1000000000 linux-swap                 \
                      method{ swap } format{ }                \
              .

d-i partman-auto/confirm boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true

### Configuración de usuario
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Administrador
d-i passwd/username string admin
d-i passwd/user-password password Cambiala123!
d-i passwd/user-password-again password Cambiala123!
d-i user-setup/allow-password-weak boolean false

### Instalación del sistema base
d-i base-installer/install-recommends boolean false

### Selección de paquetes
tasksel tasksel/first multiselect standard, ssh-server

### Instalador de TTY
d-i pkgsel/include string openssh-server sudo htop curl wget net-tools tmux

### Participación en estadísticas
popularity-contest popularity-contest/participate boolean false

### Instalación del cargador de arranque
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-pc/install_devices multiselect /dev/sda

### Finalización
d-i finish-install/reboot_in_progress note

### Habilitar servicios y herramientas útiles
d-i preseed/late_command string \
    in-target systemctl enable ssh; \
    in-target apt-get update; \
    in-target apt-get clean; \
    in-target usermod -aG sudo admin
